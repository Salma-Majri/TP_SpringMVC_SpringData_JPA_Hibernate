<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>
<body>
<div class="p-3" layout:fragment="content1">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">Edit Product</div>
            <div class="card-body">
                <form th:action="@{/admin/update}" method="post">
                    <input type="hidden" name="id" th:value="${product.id}">

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="name" class="form-control" th:value="${product.name}">
                        <span class="text-danger" th:errors="${product.name}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" name="price" class="form-control" th:value="${product.price}">
                        <span class="text-danger" th:errors="${product.price}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" th:value="${product.quantity}">
                        <span class="text-danger" th:errors="${product.quantity}"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Update Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
